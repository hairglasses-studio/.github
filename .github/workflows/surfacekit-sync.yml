name: Surfacekit Sync (Compatibility)

on:
  workflow_call:
    inputs:
      repo-name:
        description: "Optional repo name override for manifest-backed provider checks"
        required: false
        type: string
        default: ""
      check-skills:
        description: "Run the canonical skill surface sync check"
        required: false
        type: boolean
        default: true
      check-providers:
        description: "Run the shared Claude/Gemini provider settings check"
        required: false
        type: boolean
        default: true
      check-codex-mcp:
        description: "Verify the generated Codex MCP block is current"
        required: false
        type: boolean
        default: true
      codexkit-ref:
        description: "codexkit ref to use for parity commands"
        required: false
        type: string
        default: "main"
      surfacekit-ref:
        description: "Deprecated compatibility input. surfacekit is no longer required at runtime."
        required: false
        type: string
        default: "main"
  workflow_dispatch:
    inputs:
      repo-name:
        description: "Optional repo name override for manifest-backed provider checks"
        required: false
        default: ""
        type: string
      check-skills:
        description: "Run the canonical skill surface sync check"
        required: false
        default: true
        type: boolean
      check-providers:
        description: "Run the shared Claude/Gemini provider settings check"
        required: false
        default: true
        type: boolean
      check-codex-mcp:
        description: "Verify the generated Codex MCP block is current"
        required: false
        default: true
        type: boolean
      codexkit-ref:
        description: "codexkit ref to use for parity commands"
        required: false
        default: "main"
        type: string
      surfacekit-ref:
        description: "Deprecated compatibility input. surfacekit is no longer required at runtime."
        required: false
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  surfacekit-sync:
    uses: ./.github/workflows/codexkit-parity.yml
    with:
      repo-name: ${{ inputs.repo-name }}
      check-skills: ${{ inputs.check-skills }}
      check-providers: ${{ inputs.check-providers }}
      check-codex-mcp: ${{ inputs.check-codex-mcp }}
      codexkit-ref: ${{ inputs.codexkit-ref }}
