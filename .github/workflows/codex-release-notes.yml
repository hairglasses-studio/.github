name: Codex Release Notes

on:
  workflow_call:
    inputs:
      base_ref:
        description: "Base ref or tag for the release range"
        required: true
        type: string
      head_ref:
        description: "Head ref or tag for the release range"
        required: false
        type: string
        default: "HEAD"
      release_title:
        description: "Optional release title hint"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref or tag for the release range"
        required: true
        type: string
      head_ref:
        description: "Head ref or tag for the release range"
        required: false
        default: "HEAD"
        type: string
      release_title:
        description: "Optional release title hint"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  codex-release-notes:
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ inputs.base_ref || github.event.inputs.base_ref }}
      HEAD_REF: ${{ inputs.head_ref || github.event.inputs.head_ref }}
      RELEASE_TITLE: ${{ inputs.release_title || github.event.inputs.release_title }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout org platform repo
        uses: actions/checkout@v6
        with:
          repository: hairglasses-studio/.github
          path: .org-platform

      - name: Build prompt
        id: build_prompt
        shell: bash
        env:
          PROMPT_FILE: .org-platform/.github/codex/prompts/codex-release-notes.md
        run: |
          {
            echo "prompt<<'EOF'"
            cat "$PROMPT_FILE"
            printf '\n\nBase ref: %s\n' "$BASE_REF"
            printf 'Head ref: %s\n' "$HEAD_REF"
            if [[ -n "$RELEASE_TITLE" ]]; then
              printf 'Release title hint: %s\n' "$RELEASE_TITLE"
            fi
            printf 'Git log range to inspect: %s..%s\n' "$BASE_REF" "$HEAD_REF"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex release notes
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: read-only
          output-schema: |
            {
              "type": "object",
              "required": ["title", "summary", "highlights", "breaking_changes", "fixes", "docs", "upgrade_notes"],
              "additionalProperties": false,
              "properties": {
                "title": { "type": "string" },
                "summary": { "type": "string" },
                "highlights": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "breaking_changes": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "fixes": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "docs": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "upgrade_notes": {
                  "type": "array",
                  "items": { "type": "string" }
                }
              }
            }
          prompt: ${{ steps.build_prompt.outputs.prompt }}

      - name: Save release note artifacts
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        run: |
          printf '%s\n' "$CODEX_FINAL_MESSAGE" > codex-release-notes.json
          jq . codex-release-notes.json >/dev/null
          jq -r '[
            "# " + .title,
            "",
            .summary,
            "",
            "## Highlights",
            (.highlights[]? // empty),
            "",
            "## Breaking Changes",
            (.breaking_changes[]? // empty),
            "",
            "## Fixes",
            (.fixes[]? // empty),
            "",
            "## Docs",
            (.docs[]? // empty),
            "",
            "## Upgrade Notes",
            (.upgrade_notes[]? // empty)
          ] | join("\n")' codex-release-notes.json > codex-release-notes.md

      - name: Upload release note artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-release-notes-${{ env.BASE_REF }}-to-${{ env.HEAD_REF }}
          path: |
            codex-release-notes.json
            codex-release-notes.md
