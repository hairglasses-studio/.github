name: Codex PR Risk Summary

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number to summarize"
        required: true
        type: string
      focus:
        description: "Optional extra focus area"
        required: false
        type: string
        default: "Correctness, regressions, rollout risk, and missing tests"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to summarize"
        required: true
        type: string
      focus:
        description: "Optional extra focus area"
        required: false
        default: "Correctness, regressions, rollout risk, and missing tests"
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  codex-pr-risk-summary:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ inputs.pr_number || github.event.inputs.pr_number }}
      FOCUS: ${{ inputs.focus || github.event.inputs.focus }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/pull/${{ env.PR_NUMBER }}/merge

      - name: Pre-fetch pull request refs
        run: |
          git fetch --no-tags origin +refs/pull/${PR_NUMBER}/head

      - name: Checkout org platform repo
        uses: actions/checkout@v6
        with:
          repository: hairglasses-studio/.github
          path: .org-platform

      - name: Build prompt
        id: build_prompt
        shell: bash
        env:
          PROMPT_FILE: .org-platform/.github/codex/prompts/codex-pr-risk-summary.md
        run: |
          {
            echo "prompt<<'EOF'"
            cat "$PROMPT_FILE"
            printf '\n\nPull request number: %s\n' "$PR_NUMBER"
            printf 'Requested focus: %s\n' "$FOCUS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex PR risk summary
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: read-only
          output-schema: |
            {
              "type": "object",
              "required": ["summary", "overall_risk", "risk_areas", "findings", "test_gaps", "recommended_actions"],
              "additionalProperties": false,
              "properties": {
                "summary": { "type": "string" },
                "overall_risk": {
                  "type": "string",
                  "enum": ["low", "medium", "high"]
                },
                "risk_areas": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "findings": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "required": ["severity", "title", "file", "evidence", "impact", "mitigation"],
                    "additionalProperties": false,
                    "properties": {
                      "severity": {
                        "type": "string",
                        "enum": ["high", "medium", "low"]
                      },
                      "title": { "type": "string" },
                      "file": { "type": "string" },
                      "evidence": { "type": "string" },
                      "impact": { "type": "string" },
                      "mitigation": { "type": "string" }
                    }
                  }
                },
                "test_gaps": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "recommended_actions": {
                  "type": "array",
                  "items": { "type": "string" }
                }
              }
            }
          prompt: ${{ steps.build_prompt.outputs.prompt }}

      - name: Save PR risk summary artifacts
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        run: |
          printf '%s\n' "$CODEX_FINAL_MESSAGE" > codex-pr-risk-summary.json
          jq . codex-pr-risk-summary.json >/dev/null
          jq '{
            summary,
            overall_risk,
            finding_count: (.findings | length),
            high_findings: ([.findings[] | select(.severity == "high")] | length),
            risk_areas,
            test_gaps,
            recommended_actions
          }' codex-pr-risk-summary.json > codex-pr-risk-summary-summary.json

      - name: Upload PR risk summary
        uses: actions/upload-artifact@v4
        with:
          name: codex-pr-risk-summary-pr-${{ env.PR_NUMBER }}
          path: |
            codex-pr-risk-summary.json
            codex-pr-risk-summary-summary.json
