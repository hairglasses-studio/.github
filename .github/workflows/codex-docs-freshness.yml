name: Codex Docs Freshness

on:
  workflow_call:
    inputs:
      docs_scope:
        description: "Which docs Codex should audit"
        required: false
        type: string
        default: "Repository docs, setup guides, and user-facing automation docs"
  workflow_dispatch:
    inputs:
      docs_scope:
        description: "Which docs Codex should audit"
        required: false
        default: "Repository docs, setup guides, and user-facing automation docs"
        type: string

permissions:
  contents: read

jobs:
  codex-docs-freshness:
    runs-on: [self-hosted, archglasses, optimized]
    env:
      DOCS_SCOPE: ${{ inputs.docs_scope || github.event.inputs.docs_scope }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout org platform repo
        uses: actions/checkout@v6
        with:
          repository: hairglasses-studio/.github
          path: .org-platform

      - name: Build prompt
        id: build_prompt
        shell: bash
        env:
          PROMPT_FILE: .org-platform/.github/codex/prompts/codex-docs-freshness.md
        run: |
          {
            echo "prompt<<'EOF'"
            cat "$PROMPT_FILE"
            printf '\n\nDocs scope: %s\n' "$DOCS_SCOPE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex docs freshness audit
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: read-only
          output-schema: |
            {
              "type": "object",
              "required": ["summary", "scope", "stale_items", "missing_docs", "follow_up"],
              "additionalProperties": false,
              "properties": {
                "summary": { "type": "string" },
                "scope": { "type": "string" },
                "stale_items": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "required": ["path", "issue", "evidence", "suggested_update"],
                    "additionalProperties": false,
                    "properties": {
                      "path": { "type": "string" },
                      "issue": { "type": "string" },
                      "evidence": { "type": "string" },
                      "suggested_update": { "type": "string" }
                    }
                  }
                },
                "missing_docs": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "follow_up": {
                  "type": "array",
                  "items": { "type": "string" }
                }
              }
            }
          prompt: ${{ steps.build_prompt.outputs.prompt }}

      - name: Save docs freshness artifacts
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        run: |
          printf '%s\n' "$CODEX_FINAL_MESSAGE" > codex-docs-freshness.json
          jq . codex-docs-freshness.json >/dev/null
          jq '{
            summary,
            scope,
            stale_count: (.stale_items | length),
            missing_docs,
            follow_up
          }' codex-docs-freshness.json > codex-docs-freshness-summary.json

      - name: Upload docs freshness audit
        uses: actions/upload-artifact@v4
        with:
          name: codex-docs-freshness
          path: |
            codex-docs-freshness.json
            codex-docs-freshness-summary.json
